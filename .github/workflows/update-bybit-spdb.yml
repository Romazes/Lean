name: Update Bybit SPDB

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-spdb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Lean
        uses: actions/checkout@v4
        with:
          path: Lean

      - name: Checkout Lean.Brokerages.ByBit
        uses: actions/checkout@v4
        with:
          repository: QuantConnect/Lean.Brokerages.ByBit
          path: Lean.Brokerages.ByBit

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Write ToolBox config.json
        run: |
          mkdir -p /tmp/bybit-spdb
          printf '{\n  "data-folder": "%s/Lean/Data/",\n  "temp-output-directory": "/tmp/bybit-spdb"\n}\n' \
            "${{ github.workspace }}" \
            > Lean.Brokerages.ByBit/QuantConnect.BybitBrokerage.ToolBox/config.json

      - name: Setup Tor proxy
        run: |
          sudo apt-get install -y tor torsocks
          sudo systemctl start tor
          echo "Waiting for Tor circuit to be established..."
          for i in $(seq 1 24); do
            if nc -z 127.0.0.1 9050 2>/dev/null; then
              echo "Tor SOCKS port is ready"
              break
            fi
            echo "Attempt $i/24: Tor not yet ready, retrying in 5s..."
            sleep 5
          done

      - name: Run Bybit SPDB updater
        working-directory: Lean.Brokerages.ByBit/QuantConnect.BybitBrokerage.ToolBox
        run: torsocks dotnet run -- --app updater

      - name: Copy updated file back to data folder
        run: |
          cp /tmp/bybit-spdb/symbol-properties/symbol-properties-database.csv \
             ${{ github.workspace }}/Lean/Data/symbol-properties/symbol-properties-database.csv

      - name: Cleanup config.json
        if: always()
        run: rm -f Lean.Brokerages.ByBit/QuantConnect.BybitBrokerage.ToolBox/config.json

      - name: Check for changes
        id: diff
        working-directory: Lean
        run: |
          git diff --quiet Data/symbol-properties/symbol-properties-database.csv \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create branch and PR
        if: steps.diff.outputs.changed == 'true'
        working-directory: Lean
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="update-bybit-spdb-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Data/symbol-properties/symbol-properties-database.csv
          git commit -m "Update SPDB - Bybit"
          git push origin "$BRANCH"
          gh pr create \
            --title "Update SPDB - Bybit" \
            --body "Automated update of Bybit entries in symbol-properties-database.csv via Bybit API." \
            --base master \
            --head "$BRANCH"

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "symbol-properties-database.csv is already up to date."
