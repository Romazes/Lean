name: Update Bybit SPDB

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-spdb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Lean
        uses: actions/checkout@v4
        with:
          path: Lean

      - name: Checkout Lean.Brokerages.ByBit
        uses: actions/checkout@v4
        with:
          repository: QuantConnect/Lean.Brokerages.ByBit
          path: Lean.Brokerages.ByBit

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build ToolBox
        working-directory: Lean.Brokerages.ByBit/QuantConnect.BybitBrokerage.ToolBox
        run: dotnet build -c Release

      - name: Setup paths (no config.json needed)
        run: |
          # Make the default temp-output-directory writable
          sudo mkdir -p /temp-output-directory/symbol-properties
          sudo chmod -R 777 /temp-output-directory
          # Pre-populate with existing CSV so the updater can read+merge it
          cp Lean/Data/symbol-properties/symbol-properties-database.csv \
            /temp-output-directory/symbol-properties/symbol-properties-database.csv
          # Symlink so default data-folder (../../../Data/) resolves to Lean/Data
          ln -s ${{ github.workspace }}/Lean/Data \
            ${{ github.workspace }}/Lean.Brokerages.ByBit/Data

      - name: Run Bybit SPDB updater
        working-directory: Lean.Brokerages.ByBit/QuantConnect.BybitBrokerage.ToolBox/bin/Release
        run: dotnet QuantConnect.Brokerages.Bybit.ToolBox.dll --app updater

      - name: Copy updated CSV back to Lean Data folder
        run: cp /temp-output-directory/symbol-properties/symbol-properties-database.csv Lean/Data/symbol-properties/symbol-properties-database.csv

      - name: Check for changes
        id: diff
        working-directory: Lean
        run: |
          git diff --quiet Data/symbol-properties/symbol-properties-database.csv \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create branch and PR
        if: steps.diff.outputs.changed == 'true'
        working-directory: Lean
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="update-bybit-spdb-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Data/symbol-properties/symbol-properties-database.csv
          git commit -m "Update SPDB - Bybit"
          git push origin "$BRANCH"
          gh pr create \
            --title "Update SPDB - Bybit" \
            --body "Automated update of Bybit entries in symbol-properties-database.csv via Bybit API." \
            --base master \
            --head "$BRANCH"

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "symbol-properties-database.csv is already up to date."
